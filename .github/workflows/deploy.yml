name: Deploy payment-method-service to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com/mc-bootstrap-registry
  IMAGE_NAME: payment-method-service
  DEPLOYMENT_NAME: payment-method-service
  CONTAINER_NAME: payment-method
  NAMESPACE: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCR_TOKEN }}
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Build and Push Image (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          target: production
          provenance: false
          sbom: false
          build-args: |
            GITHUB_TOKEN=${{ secrets.GO_PRIVATE_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          if echo "$SSH_PRIVATE_KEY" | grep -q '^-----BEGIN'; then
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          else
            echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}

      - name: Deploy to K8s
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
            "export KUBECONFIG=/home/deploy/.kube/config && \
             kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
               ${{ env.CONTAINER_NAME }}=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
               -n ${{ env.NAMESPACE }} && \
             kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
               -n ${{ env.NAMESPACE }} --timeout=180s"

      - name: Verify Pod Ready
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
            "export KUBECONFIG=/home/deploy/.kube/config && \
             READY=\$(kubectl get pods -l app=payment-method-service -o jsonpath='{.items[0].status.containerStatuses[0].ready}') && \
             IMAGE=\$(kubectl get pods -l app=payment-method-service -o jsonpath='{.items[0].spec.containers[0].image}') && \
             echo \"Pod ready: \$READY\" && echo \"Image: \$IMAGE\" && \
             [ \"\$READY\" = 'true' ] || (echo '❌ Pod not ready'; exit 1) && \
             echo '✅ payment-method-service is running and healthy'"



      - name: Collect diagnostics and notify Telegram on failure
        if: failure()
        run: |
          DIAG="SSH unavailable (pre-deploy failure)"
          if [ -f ~/.ssh/deploy_key ]; then
            DIAG=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              deploy@${{ secrets.DROPLET_IP }} \
              'export KUBECONFIG=/home/deploy/.kube/config && \
               echo "=== Pod Status ===" && \
               kubectl get pods -l app=${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} 2>/dev/null | tail -5 && \
               echo "=== Events ===" && \
               kubectl describe pod -l app=${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} 2>/dev/null | grep -A8 "Events:" | tail -10 && \
               echo "=== Logs ===" && \
               (kubectl logs -l app=${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} --previous --tail=20 2>/dev/null || \
                kubectl logs -l app=${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} --tail=20 2>/dev/null || \
                echo "no logs")' \
              2>/dev/null | head -c 2800) || DIAG="SSH failed"
          fi
          MSG=$(printf '❌ FAILED: ${{ env.IMAGE_NAME }}\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n%s' "$DIAG")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MSG"

      - name: Notify Telegram on success
        if: success()
        run: |
          MSG=$(printf '✅ DEPLOYED: ${{ env.IMAGE_NAME }}\nCommit: ${{ github.sha }}')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MSG"

      - name: Notify Langfuse on deploy
        if: always()
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        run: |
          [ -z "$LANGFUSE_PUBLIC_KEY" ] && exit 0
          STATUS="${{ job.status }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TRACE_ID="ci-${{ env.IMAGE_NAME }}-${{ github.sha }}"
          curl -s -X POST "$LANGFUSE_BASE_URL/api/public/traces" \
            -u "$LANGFUSE_PUBLIC_KEY:$LANGFUSE_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"id\": \"$TRACE_ID\",
              \"name\": \"ci:deploy\",
              \"timestamp\": \"$TIMESTAMP\",
              \"input\": \"${{ github.sha }}\",
              \"metadata\": {
                \"service\": \"${{ env.IMAGE_NAME }}\",
                \"sha\": \"${{ github.sha }}\",
                \"run_id\": \"${{ github.run_id }}\",
                \"branch\": \"${{ github.ref_name }}\",
                \"status\": \"$STATUS\"
              },
              \"tags\": [\"ci\", \"deploy\", \"service:${{ env.IMAGE_NAME }}\", \"status:$STATUS\"]
            }" > /dev/null || true
